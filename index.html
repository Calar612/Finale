<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FINALE</title>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: #000;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    body {
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      font-size: 20px;
      color: #e0e0e0;
      line-height: 1.6;
      padding: 2.5rem 2.75rem;
    }

    .content {
      max-width: 860px;
    }

    p {
      margin-bottom: 1.4em;
    }

    .image-block {
      margin-top: 2rem;
    }

    .image-block img {
      max-width: 100%;
      display: block;
    }

    .cursor {
      display: inline-block;
      width: 11px;
      height: 1.1em;
      background: #e0e0e0;
      vertical-align: text-bottom;
      animation: blink 1.1s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>
  <main class="content">
    <p>Salve, benvenuto in questo esperimento sociale,<br>
    vi abbiamo selezionato per risolvere un puzzle<br>
    di difficolt&agrave; alta. Risolvendo il puzzle, avrete<br>
    il diritto ad una premiazione.</p>

    <p>Buona fortuna</p>

    <p>FINALE</p>

    <p>PS: In questa immagine c'&egrave; un messaggio segreto<br>
    per proseguire, trovatelo.<span class="cursor"></span></p>

    <!-- Replace src with your steganographic image -->
    <div class="image-block">
      <!-- <img src="your-secret-image.jpg" alt=""> -->
    </div>
  </main>
</body>
</html>
